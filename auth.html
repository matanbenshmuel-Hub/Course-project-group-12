<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות / הרשמה | מכון אינטגרציה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <!-- Hero -->
        <section class="hero-section hero-small hero-contact">
            <div class="hero-content">
                <h1>ברוכים הבאים</h1>
                <p>התחברו או הירשמו כדי לקבוע תור</p>
            </div>
        </section>

        <!-- Auth Card -->
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5 col-md-7">
                        <div class="card form-card">
                            <div class="card-body p-4">
                                <!-- Tabs -->
                                <ul class="nav nav-pills nav-fill mb-4" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active" id="login-tab" data-bs-toggle="pill"
                                                data-bs-target="#login-pane" type="button" role="tab">התחברות</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="register-tab" data-bs-toggle="pill"
                                                data-bs-target="#register-pane" type="button" role="tab">הרשמה</button>
                                    </li>
                                </ul>

                                <div class="tab-content">
                                    <!-- Login Pane -->
                                    <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                                        <form id="loginForm" novalidate>
                                            <div class="mb-3">
                                                <label for="loginEmail" class="form-label fw-semibold">אימייל</label>
                                                <input type="email" class="form-control" id="loginEmail" required>
                                                <div class="invalid-feedback">נא להזין אימייל תקין</div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="loginPassword" class="form-label fw-semibold">סיסמה</label>
                                                <input type="password" class="form-control" id="loginPassword" required>
                                                <div class="invalid-feedback">נא להזין סיסמה</div>
                                            </div>
                                            <div id="loginError" class="alert alert-danger d-none"></div>
                                            <button type="submit" class="btn btn-accent w-100 py-2 fs-5" id="loginBtn">התחברות</button>
                                        </form>
                                    </div>

                                    <!-- Register Pane -->
                                    <div class="tab-pane fade" id="register-pane" role="tabpanel">
                                        <form id="registerForm" novalidate>
                                            <div class="mb-3">
                                                <label for="regName" class="form-label fw-semibold">שם מלא</label>
                                                <input type="text" class="form-control" id="regName" required>
                                                <div class="invalid-feedback">נא להזין שם מלא (לפחות 2 תווים)</div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="regPhone" class="form-label fw-semibold">טלפון</label>
                                                <input type="tel" class="form-control" id="regPhone" placeholder="0501234567" required>
                                                <div class="invalid-feedback">טלפון חייב להכיל 10 ספרות ולהתחיל ב-0</div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="regEmail" class="form-label fw-semibold">אימייל</label>
                                                <input type="email" class="form-control" id="regEmail" required>
                                                <div class="invalid-feedback">נא להזין אימייל תקין</div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="regPassword" class="form-label fw-semibold">סיסמה</label>
                                                <input type="password" class="form-control" id="regPassword" required>
                                                <div class="form-text">לפחות 6 תווים</div>
                                                <div class="invalid-feedback">סיסמה חייבת להכיל לפחות 6 תווים</div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="regPasswordConfirm" class="form-label fw-semibold">אישור סיסמה</label>
                                                <input type="password" class="form-control" id="regPasswordConfirm" required>
                                                <div class="invalid-feedback">הסיסמאות אינן תואמות</div>
                                            </div>
                                            <div id="registerError" class="alert alert-danger d-none"></div>
                                            <button type="submit" class="btn btn-accent w-100 py-2 fs-5" id="registerBtn">הרשמה</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/treatments.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
