<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תחומי טיפול | מכון אינטגרציה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <!-- Hero -->
        <section class="hero-section hero-small hero-treatments">
            <div class="hero-content">
                <h1>תחומי טיפול</h1>
                <p>מגוון רחב של תחומי התמחות למענה מקצועי ומותאם אישית</p>
            </div>
        </section>

        <!-- Treatments Carousel -->
        <section class="py-5">
            <div class="container">
                <div id="treatmentsCarousel" class="carousel slide" data-bs-ride="false">
                    <div class="carousel-inner" id="carouselInner">
                        <!-- Built dynamically by treatments.js -->
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#treatmentsCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">הקודם</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#treatmentsCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">הבא</span>
                    </button>
                    <div class="carousel-indicators" id="carouselIndicators">
                        <!-- Built dynamically -->
                    </div>
                </div>
            </div>
        </section>

        <!-- CTA -->
        <section class="py-5 text-center bg-white">
            <div class="container fade-in">
                <h3 class="mb-3">מעוניינים להתחיל טיפול?</h3>
                <p class="text-muted mb-4">צרו קשר ונתאים עבורכם את הטיפול המתאים ביותר</p>
                <a href="contact.html" class="btn btn-accent btn-lg px-5">צרו קשר</a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/treatments.js"></script>
    <script src="js/common.js"></script>
</body>
</html>
